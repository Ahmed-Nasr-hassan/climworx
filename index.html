<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ClimWorx — ICON Global Weather Dashboard</title>
  <link rel="preconnect" href="https://basemaps.cartocdn.com" crossorigin />
  <link rel="preconnect" href="https://tiles.basemaps.cartocdn.com" crossorigin />
  <link rel="dns-prefetch" href="https://basemaps.cartocdn.com" />
  <link rel="dns-prefetch" href="https://tiles.basemaps.cartocdn.com" />
  <!-- Warm HTTP cache + start JSON download before the deferred module runs -->
  <link rel="preload" as="fetch" href="https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json" crossorigin />
  <script>
    (function () {
      var u = 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json';
      window.__CARTO_DARK_STYLE_JSON_PROMISE = fetch(u).then(function (r) {
        return r.json();
      });
    })();
  </script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- MapLibre GL JS -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <!-- MapLibre Draw (fork of mapbox-gl-draw for MapLibre) -->
  <link rel="stylesheet" href="https://unpkg.com/@mapbox/mapbox-gl-draw@1.4.3/dist/mapbox-gl-draw.css" />
  <script src="https://unpkg.com/@mapbox/mapbox-gl-draw@1.4.3/dist/mapbox-gl-draw.js"></script>

  <!-- D3 color scales -->
  <script src="https://cdn.jsdelivr.net/npm/d3-color@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-interpolate@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-scale-chromatic@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-scale@4"></script>

  <!-- Pako for GZip decompression -->
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>

  <style>
    /* Hide MapLibre attribution clutter for cleaner look */
    .maplibregl-ctrl-attrib { display: none !important; }
    :root {
      --top-ui-gap-mobile: 0.5rem;
      --top-ui-gap-desktop: 1rem;
      --compass-size-mobile: 40px;
      --compass-size-desktop: 44px;
      --top-row-gap-mobile: 0.5rem;
      --top-row-gap-desktop: 0.75rem;
    }
    /* North arrow / compass control styled like glass panels */
    .maplibregl-ctrl-top-right {
      top: var(--top-ui-gap-mobile);
      right: var(--top-ui-gap-mobile);
    }
    .maplibregl-ctrl-top-right .maplibregl-ctrl-group {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1rem;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.35), 0 8px 10px -6px rgba(0,0,0,0.35);
      overflow: hidden;
    }
    .maplibregl-ctrl-top-right .maplibregl-ctrl-compass {
      width: var(--compass-size-mobile);
      height: var(--compass-size-mobile);
      color: rgba(255,255,255,0.78);
    }
    .maplibregl-ctrl-top-right .maplibregl-ctrl-compass:hover {
      color: rgba(255,255,255,1);
      background: rgba(255,255,255,0.08);
    }
    @media (min-width: 640px) {
      .maplibregl-ctrl-top-right {
        top: var(--top-ui-gap-desktop);
        right: var(--top-ui-gap-desktop);
      }
      .maplibregl-ctrl-top-right .maplibregl-ctrl-compass {
        width: var(--compass-size-desktop);
        height: var(--compass-size-desktop);
      }
    }
    /* Glass panels */
    .glass {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    /* Stronger panel treatment on darker/vector basemaps for legibility */
    body.theme-dark-panels .glass {
      background: rgba(0, 0, 0, 0.62);
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    body.theme-dark-panels .maplibregl-ctrl-top-right .maplibregl-ctrl-group {
      background: rgba(0, 0, 0, 0.62);
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    body.theme-dark-panels #run-badge,
    body.theme-dark-panels #clock-meta,
    body.theme-dark-panels #area-info,
    body.theme-dark-panels #legend-max,
    body.theme-dark-panels #legend-min,
    body.theme-dark-panels #step-label,
    body.theme-dark-panels #basemap-attrib,
    body.theme-dark-panels #tooltip-coords {
      color: rgba(255, 255, 255, 0.78) !important;
    }
    body.theme-dark-panels #controls [class*="text-white/40"],
    body.theme-dark-panels #controls [class*="text-white/50"] {
      color: rgba(255, 255, 255, 0.74) !important;
    }
    /* Timeline slider styling */
    input[type="range"] { -webkit-appearance: none; background: transparent; }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px; border-radius: 2px; background: rgba(255,255,255,0.2);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: white; margin-top: -5px; cursor: pointer;
    }
    /* Toast animation */
    @keyframes toast-in { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .toast-animate { animation: toast-in 0.3s ease-out; }
    /* Pulse animation for draw button */
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(99,102,241,0.5); }
      70% { box-shadow: 0 0 0 8px rgba(99,102,241,0); }
      100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
    }
    .pulse-active { animation: pulse-ring 1.5s infinite; }
    /* Crosshair while drawing a region (MapLibre nests canvases) */
    .draw-area-active .maplibregl-canvas-container canvas,
    .draw-area-active .maplibregl-canvas {
      cursor: crosshair !important;
    }
    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    /* Sparkline in tooltip */
    .sparkline { display: inline-block; vertical-align: middle; }
    /* Parameter dropdown: dark background for the OS-rendered option list */
    #param-select option { background: #1a1a2e; color: rgba(255,255,255,0.9); }
  </style>
</head>

<body class="bg-gray-950 text-white overflow-hidden h-screen w-screen relative">

  <!-- ====== Map (full viewport) ====== -->
  <div id="map" class="absolute inset-0 z-0"></div>

  <!-- ====== Mobile drawing overlay (shown only while drawing on mobile) ====== -->
  <div id="drawing-overlay" class="sm:hidden hidden absolute inset-x-0 top-0 z-50 flex flex-col items-center gap-2 pt-3 px-4 pointer-events-none">
    <button type="button" onclick="toggleDrawArea()"
            class="pointer-events-auto w-full max-w-xs flex items-center justify-center gap-2 py-3 rounded-2xl bg-red-500/80 backdrop-blur text-white font-semibold text-sm shadow-xl active:scale-95 transition-transform">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
      Cancel Drawing
    </button>
    <div class="pointer-events-none bg-black/50 backdrop-blur-sm text-white/80 text-xs px-4 py-2 rounded-xl text-center leading-snug shadow">
      Tap to add points &nbsp;·&nbsp; Double-tap to finish
    </div>
  </div>

  <!-- ====== Mobile toggle button (top-left, visible only on small screens) ====== -->
  <button id="btn-toggle-panel" onclick="togglePanel()"
          class="glass sm:hidden absolute top-2 left-2 z-40 w-10 h-10 rounded-xl flex items-center justify-center shadow-xl text-white/70 hover:text-white transition-all">
    <svg id="icon-panel-open" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    <svg id="icon-panel-close" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
  </button>

  <!-- ====== Controls Panel (top-left) ====== -->
  <div id="controls" class="glass absolute top-14 left-2 sm:top-4 sm:left-4 z-30 rounded-2xl p-3 sm:p-4 w-56 sm:w-72 space-y-2 sm:space-y-3 shadow-2xl max-h-[calc(100vh-5rem)] overflow-y-auto hidden sm:block">
    <!-- Run info -->
    <div id="run-badge" class="text-xs text-white/50 font-mono tracking-wide">Loading...</div>

    <!-- Basemap -->
    <div>
      <div class="text-[10px] uppercase tracking-wider text-white/40 mb-1.5">Basemap</div>
      <div class="grid grid-cols-3 rounded-xl overflow-hidden border border-white/10 gap-px bg-white/10">
        <button type="button" id="btn-basemap-imagery" class="py-2 text-[11px] sm:text-xs font-medium transition-all bg-emerald-500/25 text-emerald-200"
                onclick="switchBasemap('imagery')">
          Satellite
        </button>
        <button type="button" id="btn-basemap-dark" class="py-2 text-[11px] sm:text-xs font-medium transition-all text-white/40"
                onclick="switchBasemap('dark')">
          Dark
        </button>
        <button type="button" id="btn-basemap-topo" class="py-2 text-[11px] sm:text-xs font-medium transition-all text-white/40"
                onclick="switchBasemap('topo')">
          Topo
        </button>
      </div>
      <p id="basemap-attrib" class="text-[10px] text-white/35 mt-1.5 leading-snug">
        Imagery © Esri, Maxar, Earthstar Geographics
      </p>
    </div>

    <!-- Parameter selector -->
    <div class="relative">
      <select id="param-select"
              onchange="switchParam(this.value)"
              class="w-full appearance-none rounded-xl border border-white/10 bg-white/5 px-3 py-2 pr-8 text-sm font-medium text-white/90 cursor-pointer focus:outline-none focus:ring-1 focus:ring-white/20 transition-all">
      </select>
      <!-- chevron -->
      <div class="pointer-events-none absolute inset-y-0 right-2.5 flex items-center">
        <svg class="w-4 h-4 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </div>
    </div>

    <!-- Draw area (toggle: click again to cancel) -->
    <button type="button" id="btn-draw" aria-pressed="false"
            class="w-full py-2.5 rounded-xl text-sm font-medium bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 hover:bg-indigo-500/30 transition-all"
            onclick="toggleDrawArea()">
      <svg class="inline w-4 h-4 mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg>
      <span id="btn-draw-label">Draw area</span>
    </button>

    <!-- Layer appearance -->
    <div class="space-y-2 pt-2 border-t border-white/10">
      <div>
        <label class="flex items-center justify-between text-xs text-white/50">
          <span>Layer opacity</span>
          <span id="opacity-label" class="font-mono text-white/70">85%</span>
        </label>
        <input id="layer-opacity" type="range" min="0" max="100" value="85" step="1"
               class="w-full mt-1 cursor-pointer accent-indigo-400" />
      </div>

      <!-- Color ramp -->
      <div>
        <label class="text-xs text-white/50 block mb-1">Color ramp</label>
        <select id="color-ramp" onchange="changeColorRamp(this.value)"
                class="w-full bg-white/10 border border-white/10 rounded-lg text-xs px-2 py-1.5 text-white/80 cursor-pointer">
          <option value="auto" selected>Auto (per parameter)</option>
          <option value="turbo">Turbo</option>
          <option value="viridis">Viridis</option>
          <option value="inferno">Inferno</option>
          <option value="magma">Magma</option>
          <option value="plasma">Plasma</option>
          <option value="warm">Warm</option>
          <option value="cool">Cool</option>
          <option value="spectral">Spectral</option>
          <option value="rdylbu">Red-Yellow-Blue</option>
          <option value="ylgnbu">Yellow-Green-Blue</option>
          <option value="blues">Blues</option>
        </select>
      </div>

      <!-- Min / Max range -->
      <div id="range-controls">
        <label class="text-xs text-white/50 block mb-1">Value range</label>
        <div class="flex items-center gap-1.5">
          <input id="input-min" type="number" step="any"
                 class="flex-1 bg-white/10 border border-white/10 rounded-lg text-xs px-2 py-1.5 text-white/80 font-mono w-0 min-w-0"
                 placeholder="min" onchange="applyCustomRange()" />
          <span class="text-white/30 text-xs">—</span>
          <input id="input-max" type="number" step="any"
                 class="flex-1 bg-white/10 border border-white/10 rounded-lg text-xs px-2 py-1.5 text-white/80 font-mono w-0 min-w-0"
                 placeholder="max" onchange="applyCustomRange()" />
          <button onclick="resetRange()" title="Reset to auto"
                  class="shrink-0 w-7 h-7 flex items-center justify-center rounded-lg bg-white/10 hover:bg-white/20 text-white/50 hover:text-white/80 text-xs transition-all">
            ↺
          </button>
        </div>
      </div>

      <label class="flex items-center gap-2 text-xs text-white/70 cursor-pointer select-none">
        <input id="chk-smooth" type="checkbox" checked class="rounded border-white/20 bg-white/5" />
        <span>Smooth grid <span class="text-white/40">(bilinear)</span></span>
      </label>
      <label class="flex items-center gap-2 text-xs text-white/70 cursor-pointer select-none">
        <input id="chk-contours" type="checkbox" class="rounded border-white/20 bg-white/5" />
        <span>Contours</span>
      </label>
    </div>

    <!-- Area info (shown when data loaded) -->
    <div id="area-info" class="text-xs text-white/40 hidden"></div>
  </div>

  <!-- ====== Clock / Timestamp (top-right) ====== -->
  <div id="clock" class="glass absolute top-2 right-[calc(var(--top-ui-gap-mobile)+var(--compass-size-mobile)+var(--top-row-gap-mobile))] sm:top-4 sm:right-[calc(var(--top-ui-gap-desktop)+var(--compass-size-desktop)+var(--top-row-gap-desktop))] z-30 rounded-2xl px-3 py-2 sm:px-5 sm:py-3 text-right shadow-2xl hidden max-w-[45vw]">
    <div id="clock-time" class="text-sm sm:text-lg font-semibold tracking-tight truncate"></div>
    <div id="clock-meta" class="text-xs text-white/50 font-mono mt-0.5"></div>
  </div>

  <!-- ====== Color Legend (right side) ====== -->
  <div id="legend" class="glass absolute top-[4.75rem] sm:top-[6rem] right-2 sm:right-4 z-30 rounded-2xl p-2 sm:p-3 w-12 sm:w-16 hidden shadow-2xl">
    <canvas id="legend-canvas" width="24" height="200" class="mx-auto rounded"></canvas>
    <div id="legend-max" class="text-[10px] text-white/60 text-center mt-1 font-mono"></div>
    <div id="legend-min" class="text-[10px] text-white/60 text-center mt-auto font-mono"></div>
  </div>

  <!-- ====== Playback Bar (bottom, draggable) ====== -->
  <div id="playback" class="glass absolute bottom-0 left-0 right-0 z-30 hidden"
       style="border-radius: 1rem 1rem 0 0; touch-action: none; user-select: none;">
    <!-- Drag handle — drag pill to reposition, chevron button to minimize -->
    <div id="playback-handle" class="flex items-center justify-center pt-2 pb-1 cursor-grab active:cursor-grabbing relative">
      <div class="w-10 h-1 rounded-full bg-white/30"></div>
      <button id="btn-minimize-playback" type="button"
              class="absolute right-3 top-1 w-8 h-6 flex items-center justify-center text-white/40 hover:text-white/80 transition-colors"
              style="touch-action: none;">
        <svg id="icon-chevron-down" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
        <svg id="icon-chevron-up" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
        </svg>
      </button>
    </div>
    <!-- Collapsible content -->
    <div id="playback-body" class="px-3 pb-2 pr-12 sm:px-6 sm:pr-6 sm:pb-3">
      <!-- Mobile: stack vertically; Desktop: single row -->
      <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 w-full min-w-0">
        <!-- Top row on mobile: play + slider + speed -->
        <div class="flex items-center gap-2 sm:gap-3 w-full min-w-0">
          <!-- Play/Pause -->
          <button type="button" id="btn-play" onclick="togglePlay()" class="shrink-0 w-9 h-9 sm:w-10 sm:h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-all">
            <svg id="icon-play" class="w-4 h-4 sm:w-5 sm:h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" class="w-4 h-4 sm:w-5 sm:h-5 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <!-- Timeline (scaled to forecast hours, not step indices) -->
          <div class="flex-1 min-w-0 relative">
            <input id="timeline" type="range" min="0" max="180" value="0" step="1" class="w-full cursor-pointer" oninput="seekTo(this.value)" />
            <!-- Breakpoint tick: marks where 1-hourly steps end and 3-hourly begin -->
            <div id="timeline-break" title="1h → 3h step interval" class="absolute top-0 bottom-0 flex flex-col items-center pointer-events-none" style="left:0%;transform:translateX(-50%)">
              <div class="w-px h-2 bg-white/40 mt-0.5"></div>
            </div>
          </div>
          <!-- Speed -->
          <select id="speed-select" onchange="setSpeed(this.value)"
                  class="shrink-0 bg-white/10 border border-white/10 rounded-lg text-[11px] sm:text-xs px-1.5 py-1.5 text-white/80 cursor-pointer w-14 sm:w-16 text-center">
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
            <option value="4">4×</option>
          </select>
        </div>
        <!-- Step label (below on mobile, inline on desktop) -->
        <div id="step-label" class="text-[10px] sm:text-xs text-white/60 font-mono leading-snug text-center sm:text-right sm:whitespace-nowrap sm:w-56 sm:shrink-0 truncate"></div>
      </div>
    </div>
  </div>

  <!-- ====== Tooltip (follows cursor) ====== -->
  <div id="tooltip" class="glass absolute z-40 rounded-xl px-3 py-2 text-xs pointer-events-none hidden shadow-xl"
       style="min-width: 160px;">
    <div id="tooltip-coords" class="text-white/50 font-mono"></div>
    <div id="tooltip-value" class="text-sm font-semibold mt-0.5"></div>
    <canvas id="tooltip-spark" width="140" height="30" class="mt-1 sparkline rounded"></canvas>
  </div>

  <!-- ====== Loading Overlay ====== -->
  <div id="loading" class="absolute inset-0 z-50 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center">
    <div class="text-center">
      <div class="w-10 h-10 border-2 border-white/20 border-t-white rounded-full spinner mx-auto"></div>
      <div id="loading-text" class="text-sm text-white/70 mt-3">Loading forecast data...</div>
    </div>
  </div>

  <!-- ====== Toast Container ====== -->
  <div id="toasts" class="absolute top-4 left-1/2 -translate-x-1/2 z-50 space-y-2 flex flex-col items-center"></div>

  <!-- ================================================================== -->
  <script type="module">
    // =======================================================================
    // Constants & Config
    // =======================================================================
    const WORKER_BASE = 'https://icon-api-worker.ahmednasrhassan123.workers.dev';
    const ZARR_BASE   = `${WORKER_BASE}/zarr`;

    const RESOLUTION = 0.125;
    const LAT_MAX = 90.0;
    const LON_MIN = -180.0;
    const NY = 1441;
    const NX = 2879;
    const MAX_PIXELS = 150000;

    const BASEMAP_DARK_URL =
      'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json';

    /** Carto Voyager GL (vector) — detailed light map; patchable for Palestine labels. */
    const BASEMAP_TOPO_URL =
      'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json';

    /** Esri World Imagery (XYZ raster) — no API key; attribution required for display. */
    const BASEMAP_IMAGERY_STYLE = {
      version: 8,
      name: 'World Imagery',
      // Helps MapLibre / MapboxDraw after setStyle (raster-only styles omit glyphs by default).
      glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
      sources: {
        esri: {
          type: 'raster',
          tiles: [
            'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
          ],
          tileSize: 256,
          attribution:
            '<a href="https://www.esri.com/" target="_blank" rel="noopener">Esri</a>, Maxar, Earthstar Geographics',
          maxzoom: 19,
        },
      },
      layers: [
        {
          id: 'esri_world_imagery',
          type: 'raster',
          source: 'esri',
          minzoom: 0,
          maxzoom: 22,
        },
      ],
    };

    // State
    let currentBasemap = 'imagery';
    let basemapSwitchSeq = 0;
    /** styledata listener + poll from last switchBasemap; cleared before each new switch / after Draw re-attaches. */
    let basemapDrawReattachListener = null;
    let basemapDrawPollId = null;
    /** True after first style `load`; prevents basemap switch racing initial load / double Draw. */
    let mapInitialLoadDone = false;
    // ── Parameter registry ────────────────────────────────────────────────────
    // Each entry drives the dropdown, color ramp, unit conversion, tooltip, and sparkline.
    // convert: raw Zarr float → display value; decimals: tooltip precision.
    const PARAMS_CONFIG = [

    /**
     * Convert latitude to array row index.
     * Grid runs north→south: lat 90 → index 0, lat -90 → index 1440.
     */
    function latToIndex(lat) {
      return Math.round((LAT_MAX - lat) / RESOLUTION);
    }

    /**
     * Convert longitude to array column index.
     * Grid runs west→east: lon -180 → index 0, lon 179.875 → index 2878.
     */
    function lonToIndex(lon) {
      return Math.round((lon - LON_MIN) / RESOLUTION);
    }

    function indexToLat(i) { return LAT_MAX - i * RESOLUTION; }
    function indexToLon(j) { return LON_MIN + j * RESOLUTION; }

    // =======================================================================
    // Data Fetching (Manual Zarr chunk reads — no zarr.js library needed)
    // =======================================================================

    /** Fetch and parse JSON from the Zarr proxy. */
    async function fetchJson(path) {
      const resp = await fetch(`${ZARR_BASE}/${path}`);
      if (!resp.ok) throw new Error(`${resp.status} fetching ${path}`);
      return resp.json();
    }

    /** Fetch a raw Zarr chunk, decompress GZip, return Float32Array. */
    async function fetchChunk(param, chunkKey) {
      const resp = await fetch(`${ZARR_BASE}/${param}/${param}/${chunkKey}`);
      if (!resp.ok) throw new Error(`${resp.status} fetching chunk ${chunkKey}`);
      const compressed = new Uint8Array(await resp.arrayBuffer());
      const decompressed = pako.ungzip(compressed);
      return new Float32Array(decompressed.buffer);
    }

    /**
     * Fetch a spatial slice for all steps within a bounding box.
     *
     * Since Zarr chunks are [step:-1, (height:1,) lat:100, lon:100], each chunk
     * contains ALL steps for a 100x100 lat/lon tile. We figure out which chunks
     * overlap the bounding box, fetch them, and extract the needed pixels.
     *
     * Returns Float32Array of shape [nSteps, nLat, nLon] (C-order).
     */
    async function fetchSlice(param, latStart, latEnd, lonStart, lonEnd) {
      // Read .zarray to know shape/chunks
      const meta = await fetchJson(`${param}/${param}/.zarray`);
      const shape = meta.shape;
      const chunks = meta.chunks;
      const nDims = shape.length;

      // Determine which dimension indices are lat/lon
      // t_2m: [step, height, lat, lon] → lat=2, lon=3
      // tot_prec: [step, lat, lon] → lat=1, lon=2
      const latDim = nDims - 2;
      const lonDim = nDims - 1;
      const chunkLat = chunks[latDim];  // 100
      const chunkLon = chunks[lonDim];  // 100
      const nSteps = shape[0];

      const nLat = latEnd - latStart;
      const nLon = lonEnd - lonStart;

      // Chunk index ranges that overlap the bounding box
      const chunkLatStart = Math.floor(latStart / chunkLat);
      const chunkLatEnd   = Math.floor((latEnd - 1) / chunkLat);
      const chunkLonStart = Math.floor(lonStart / chunkLon);
      const chunkLonEnd   = Math.floor((lonEnd - 1) / chunkLon);

      // Prepare output: [nSteps, nLat, nLon]
      const out = new Float32Array(nSteps * nLat * nLon);
      out.fill(NaN);

      // Build list of chunks to fetch
      const chunkJobs = [];
      for (let ci = chunkLatStart; ci <= chunkLatEnd; ci++) {
        for (let cj = chunkLonStart; cj <= chunkLonEnd; cj++) {
          chunkJobs.push({ ci, cj });
        }
      }

      const totalChunks = chunkJobs.length;
      let fetched = 0;
      document.getElementById('loading-text').textContent =
        `Loading forecast data... (0/${totalChunks} chunks)`;

      // Fetch chunks in parallel (batches of 6 to avoid overwhelming)
      const BATCH = 6;
      for (let b = 0; b < chunkJobs.length; b += BATCH) {
        const batch = chunkJobs.slice(b, b + BATCH);
        await Promise.all(batch.map(async ({ ci, cj }) => {
          // Build chunk key: leading dims are all 0, then ci.cj
          // t_2m 4D: 0.0.{ci}.{cj}  |  tot_prec 3D: 0.{ci}.{cj}
          const leadingZeros = Array(nDims - 2).fill(0).join('.');
          const chunkKey = `${leadingZeros}.${ci}.${cj}`;

          try {
            const chunkData = await fetchChunk(param, chunkKey);

            // Chunk covers lat range [ci*chunkLat .. (ci+1)*chunkLat-1]
            const chunkLatOffset = ci * chunkLat;
            const chunkLonOffset = cj * chunkLon;

            // Actual chunk dims (may be smaller at grid edges)
            const actualChunkLat = Math.min(chunkLat, shape[latDim] - chunkLatOffset);
            const actualChunkLon = Math.min(chunkLon, shape[lonDim] - chunkLonOffset);

            // Stride within this chunk's flat array (C-order)
            // For 4D [step, height=1, lat, lon]: stride_step = 1*lat*lon
            // For 3D [step, lat, lon]: stride_step = lat*lon
            // For 4D, height dim contributes: stride = height * lat * lon
            const chunkStepStride = nDims === 4
              ? chunks[1] * actualChunkLat * actualChunkLon
              : actualChunkLat * actualChunkLon;

            for (let s = 0; s < nSteps; s++) {
              const stepOffset = s * chunkStepStride;
              // Height=0 adds nothing (0 * lat*lon = 0)

              for (let li = 0; li < actualChunkLat; li++) {
                const globalLat = chunkLatOffset + li;
                if (globalLat < latStart || globalLat >= latEnd) continue;

                for (let lj = 0; lj < actualChunkLon; lj++) {
                  const globalLon = chunkLonOffset + lj;
                  if (globalLon < lonStart || globalLon >= lonEnd) continue;

                  const srcIdx = stepOffset + li * actualChunkLon + lj;
                  const dstIdx = s * nLat * nLon + (globalLat - latStart) * nLon + (globalLon - lonStart);
                  out[dstIdx] = chunkData[srcIdx];
                }
              }
            }
          } catch (err) {
            console.warn(`Chunk ${ci},${cj} failed:`, err);
          }

          fetched++;
          document.getElementById('loading-text').textContent =
            `Loading forecast data... (${fetched}/${totalChunks} chunks)`;
        }));
      }

      return { data: out, nSteps, nLat, nLon };
    }

    let PATCHED_DARK_STYLE = null;
    let PATCHED_TOPO_STYLE = null;
    /** In-flight fetch+patch; reused so prefetch and switchBasemap share one request. */
    let darkStyleLoadPromise = null;
    let topoStyleLoadPromise  = null;

    /**
     * Fetches and patches the Carto dark style once. Safe to call early (prefetch) or from switchBasemap.
     */
    function ensurePatchedDarkStyle() {
      if (PATCHED_DARK_STYLE) return Promise.resolve(PATCHED_DARK_STYLE);
      if (!darkStyleLoadPromise) {
        const jsonPromise =
          window.__CARTO_DARK_STYLE_JSON_PROMISE != null
            ? window.__CARTO_DARK_STYLE_JSON_PROMISE.catch(() =>
                fetch(BASEMAP_DARK_URL).then((r) => r.json()),
              )
            : fetch(BASEMAP_DARK_URL).then((r) => r.json());
        darkStyleLoadPromise = jsonPromise
          .then((json) => {
            const copy =
              typeof structuredClone === 'function'
                ? structuredClone(json)
                : JSON.parse(JSON.stringify(json));
            PATCHED_DARK_STYLE = patchStyleJson(copy);
            return PATCHED_DARK_STYLE;
          })
          .catch((e) => {
            console.error('Failed to load dark style', e);
            darkStyleLoadPromise = null;
            return null;
          });
      }
      return darkStyleLoadPromise;
    }

    function ensurePatchedTopoStyle() {
      if (PATCHED_TOPO_STYLE) return Promise.resolve(PATCHED_TOPO_STYLE);
      if (!topoStyleLoadPromise) {
        topoStyleLoadPromise = fetch(BASEMAP_TOPO_URL).then((r) => r.json())
          .then((json) => {
            const copy =
              typeof structuredClone === 'function'
                ? structuredClone(json)
                : JSON.parse(JSON.stringify(json));
            PATCHED_TOPO_STYLE = patchStyleJson(copy);
            return PATCHED_TOPO_STYLE;
          })
          .catch((e) => {
            console.error('Failed to load topo style', e);
            topoStyleLoadPromise = null;
            return null;
          });
      }
      return topoStyleLoadPromise;
    }

    /**
     * Modifies the raw style JSON in memory before MapLibre renders it.
     */
    function patchStyleJson(style) {
      if (!style || !style.layers) return style;

      const nameEqIsrael = [
        '==',
        ['coalesce', ['get', 'name_en'], ['get', 'name:en'], ['get', 'name'], ''],
        'Israel',
      ];

      /** Wrap a zoom-safe leaf (get / literal only) — must not nest ['zoom'] inside case. */
      function wrapIsrael(leaf) {
        return ['case', nameEqIsrael, 'Palestine', leaf];
      }

      function leafFromToken(val) {
        if (typeof val === 'string') {
          const m = /^\s*\{([^}]+)\}\s*$/.exec(val);
          if (m) return ['get', m[1]];
          return ['literal', val];
        }
        return ['literal', ''];
      }

      /**
       * Legacy zoom { stops: [[z, "{name_en}"], ...] } → one flat ["step", ["zoom"], default, z1, out1, z2, out2, ...].
       * Nested step(step(...)) trees are valid but extremely slow to compile; a single step keeps MapLibre responsive.
       */
      function patchedTextFieldFromStops(stopsRaw) {
        const stops = [...stopsRaw].sort((a, b) => a[0] - b[0]);
        if (stops.length === 0) return null;

        const expr = ['step', ['zoom'], wrapIsrael(leafFromToken(stops[0][1]))];

        for (let i = 1; i < stops.length; i++) {
          expr.push(stops[i][0]);
          expr.push(wrapIsrael(leafFromToken(stops[i][1])));
        }

        return expr;
      }

      for (const layer of style.layers) {
        if (layer.type !== 'symbol') continue;
        if (!layer.layout || !layer.layout['text-field']) continue;

        const textField = layer.layout['text-field'];
        if (Array.isArray(textField) && textField[0] === 'case' && textField[2] === 'Palestine') continue;

        if (typeof textField === 'string') {
          const match = /^\s*\{([^}]+)\}\s*$/.exec(textField);
          if (match) {
            layer.layout['text-field'] = wrapIsrael(['get', match[1]]);
          } else if (textField === 'Israel') {
            layer.layout['text-field'] = 'Palestine';
          }
          continue;
        }

        if (textField && typeof textField === 'object' && !Array.isArray(textField) && Array.isArray(textField.stops)) {
          const patched = patchedTextFieldFromStops(textField.stops);
          if (patched) layer.layout['text-field'] = patched;
        }
      }
      return style;
    }

    /**
     * MapboxDraw must be recreated after setStyle. Re-attach only once map.isStyleLoaded()
     * so Draw is not added to a transient style that will be replaced when the remote JSON arrives.
     */
    window.switchBasemap = async function (mode) {
      if (!map || mode === currentBasemap) return;
      if (mode !== 'dark' && mode !== 'imagery' && mode !== 'topo') return;
      if (!mapInitialLoadDone) {
        showToast('Wait for the map to finish loading before changing basemap.', 'info');
        return;
      }

      // Forcefully cancel any active drawing state to prevent UI mismatch
      setDrawAreaToggleUi(false);
      map.getContainer().classList.remove('draw-area-active');

      if (basemapDrawReattachListener) {
        map.off('styledata', basemapDrawReattachListener);
        basemapDrawReattachListener = null;
      }
      if (basemapDrawPollId !== null) {
        clearInterval(basemapDrawPollId);
        basemapDrawPollId = null;
      }

      const seq = ++basemapSwitchSeq;

      currentBasemap = mode;
      updateBasemapToggleUI();

      let style;
      if (mode === 'imagery') {
        style = BASEMAP_IMAGERY_STYLE;
      } else if (mode === 'topo') {
        const loaded = await ensurePatchedTopoStyle();
        style = loaded || BASEMAP_TOPO_URL;
      } else {
        const loaded = await ensurePatchedDarkStyle();
        style = loaded || BASEMAP_DARK_URL;
      }

      if (seq !== basemapSwitchSeq) return;

      if (draw) {
        map.removeControl(draw);
        draw = null;
      }

      map.setStyle(style);

      const tryReattachDraw = () => {
        if (seq !== basemapSwitchSeq) return;
        if (draw) return;

        if (map.isStyleLoaded()) {
          attachDrawControl();
          if (draw) {
            if (basemapDrawReattachListener) {
              map.off('styledata', basemapDrawReattachListener);
              basemapDrawReattachListener = null;
            }
            if (basemapDrawPollId !== null) {
              clearInterval(basemapDrawPollId);
              basemapDrawPollId = null;
            }
            if (sliceData) renderFrame();
          }
        }
      };

      basemapDrawReattachListener = tryReattachDraw;
      map.on('styledata', tryReattachDraw);

      basemapDrawPollId = setInterval(() => {
        if (seq !== basemapSwitchSeq || draw) {
          clearInterval(basemapDrawPollId);
          basemapDrawPollId = null;
        } else {
          tryReattachDraw();
        }
      }, 100);
    };

    function initParamSelect() {
      const sel = document.getElementById('param-select');
      PARAMS_CONFIG.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.key;
        opt.textContent = p.label;
        sel.appendChild(opt);
      });
      sel.value = currentParam;
    }

    function initMap() {
      initParamSelect();
      map = new maplibregl.Map({
        container: 'map',
        style: BASEMAP_IMAGERY_STYLE,
        center: [29,31],  
        zoom: 3.5,
        attributionControl: false,
      });

      // Compass reset control — auto-hidden by MapLibre when bearing=0 & pitch=0
      map.addControl(
        new maplibregl.NavigationControl({
          showCompass: true,
          showZoom: false,
          visualizePitch: true,
        }),
        'top-right'
      );

      map.once('load', () => {
        mapInitialLoadDone = true;
        attachDrawControl();
        bindDrawEvents();
      });

      // Offscreen canvas for value->color mapping; MapLibre renders it via ImageSource.
      renderCanvas = document.createElement('canvas');
      renderCtx = renderCanvas.getContext('2d');

      const opacityEl = document.getElementById('layer-opacity');
      if (opacityEl) {
        opacityEl.addEventListener('input', () => {
          const lab = document.getElementById('opacity-label');
          if (lab) lab.textContent = `${opacityEl.value}%`;
          renderFrame();
        });
      }
      document.getElementById('chk-smooth')?.addEventListener('change', () => renderFrame());
      document.getElementById('chk-contours')?.addEventListener('change', () => renderFrame());

      // Tooltip hover (mouse + touch) — attached to map container so the canvas
      // never needs to capture pointer events (which would block map panning).
      const mapContainer = map.getContainer();
      mapContainer.addEventListener('mousemove', onCanvasHover);
      mapContainer.addEventListener('mouseleave', () => {
        document.getElementById('tooltip').classList.add('hidden');
      });
      let _touchHoldTimer = null;
      mapContainer.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        const t = e.touches[0];
        const cx = t.clientX, cy = t.clientY;
        _touchHoldTimer = setTimeout(() => {
          _touchHoldTimer = null;
          onCanvasHover({ clientX: cx, clientY: cy });
        }, 400);
      }, { passive: true });
      mapContainer.addEventListener('touchmove', (e) => {
        // Cancel hold if finger moved significantly (user is panning)
        if (_touchHoldTimer) {
          clearTimeout(_touchHoldTimer);
          _touchHoldTimer = null;
        }
        if (e.touches.length === 1) {
          const t = e.touches[0];
          onCanvasHover({ clientX: t.clientX, clientY: t.clientY });
        }
      }, { passive: true });
      mapContainer.addEventListener('touchend', () => {
        if (_touchHoldTimer) { clearTimeout(_touchHoldTimer); _touchHoldTimer = null; }
        document.getElementById('tooltip').classList.add('hidden');
      });

      // On mobile: hide the panel during map interaction, restore when done.
      // Only auto-hide if the user had it open; if already closed, leave it.
      let panelHiddenByMap = false;

      function onMapInteractionStart() {
        if (!isMobile() || !panelVisible || panelHiddenByMap) return;
        panelHiddenByMap = true;
        document.getElementById('controls').classList.add('hidden');
      }

      function onMapInteractionEnd() {
        if (!isMobile() || !panelHiddenByMap) return;
        panelHiddenByMap = false;
        document.getElementById('controls').classList.remove('hidden');
      }

      map.on('movestart', onMapInteractionStart);
      map.on('moveend',   onMapInteractionEnd);

      // ── Playback panel: drag-to-reposition + chevron to minimize ─────────
      (function () {
        const panel    = document.getElementById('playback');
        const handle   = document.getElementById('playback-handle');
        const body     = document.getElementById('playback-body');
        const btnMin   = document.getElementById('btn-minimize-playback');
        const iconDown = document.getElementById('icon-chevron-down');
        const iconUp   = document.getElementById('icon-chevron-up');

        // Compute 1cm in device pixels for the initial lift on mobile
        const _tmp = document.createElement('div');
        _tmp.style.cssText = 'position:absolute;height:1cm;visibility:hidden';
        document.body.appendChild(_tmp);
        const INITIAL_BOTTOM = isMobile() ? _tmp.offsetHeight : 0;
        document.body.removeChild(_tmp);

        let offsetY     = INITIAL_BOTTOM;
        let minimized   = false;
        let dragActive  = false;
        let startY      = 0;
        let startOffset = 0;
        const MAX_LIFT  = 220;
        const DRAG_THRESHOLD = 12;   // px — keeps taps from accidentally dragging

        function applyOffset(px) {
          offsetY = Math.max(0, Math.min(MAX_LIFT, px));
          panel.style.bottom = offsetY + 'px';
        }
        applyOffset(INITIAL_BOTTOM);

        function toggleMinimize() {
          minimized = !minimized;
          body.style.display = minimized ? 'none' : '';
          iconDown.classList.toggle('hidden', minimized);
          iconUp.classList.toggle('hidden', !minimized);
        }

        btnMin.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleMinimize();
        });

        // Drag on the handle bar (not the button)
        handle.addEventListener('pointerdown', (e) => {
          if (e.target === btnMin || btnMin.contains(e.target)) return;
          dragActive  = false;
          startY      = e.clientY;
          startOffset = offsetY;
          handle.setPointerCapture(e.pointerId);
          e.preventDefault();
        });

        handle.addEventListener('pointermove', (e) => {
          if (!handle.hasPointerCapture(e.pointerId)) return;
          const dy = startY - e.clientY;
          if (!dragActive && Math.abs(dy) > DRAG_THRESHOLD) dragActive = true;
          if (dragActive) applyOffset(startOffset + dy);
        });

        handle.addEventListener('pointerup', () => { dragActive = false; });
      }());

      updateBasemapToggleUI();
    }

    function clearDataOverlay() {
      if (!map) return;
      if (map.getLayer(DATA_LAYER_ID)) map.removeLayer(DATA_LAYER_ID);
      if (map.getSource(DATA_SOURCE_ID)) map.removeSource(DATA_SOURCE_ID);
    }

    // =======================================================================
    // Drawing Tool
    // =======================================================================
    let panelWasOpenBeforeDrawing = false;

    function setDrawAreaToggleUi(drawingOn) {
      const btn = document.getElementById('btn-draw');
      const label = document.getElementById('btn-draw-label');
      if (!btn) return;
      if (label) label.textContent = drawingOn ? 'Cancel drawing' : 'Draw area';
      btn.setAttribute('aria-pressed', drawingOn ? 'true' : 'false');
      btn.classList.toggle('pulse-active', !!drawingOn);

      // Mobile: show floating overlay while drawing, hide panel
      if (isMobile()) {
        const overlay = document.getElementById('drawing-overlay');
        const panel   = document.getElementById('controls');
        if (drawingOn) {
          panelWasOpenBeforeDrawing = panelVisible;
          overlay.classList.remove('hidden');
          // close panel so the full map is available for drawing
          if (panelVisible) {
            panel.classList.add('hidden');
          }
        } else {
          overlay.classList.add('hidden');
          // restore panel only if it was open before drawing started
          if (panelWasOpenBeforeDrawing) {
            panel.classList.remove('hidden');
          }
        }
      }
    }

    window.toggleDrawArea = function() {
      if (!map) return;
      if (!draw) {
        showToast('Map is still loading — wait a second and try again.', 'info');
        return;
      }
      const mode = draw.getMode();
      if (mode === 'draw_polygon') {
        draw.deleteAll();
        draw.changeMode('simple_select');
        map.getContainer().classList.remove('draw-area-active');
        setDrawAreaToggleUi(false);
        return;
      }
      draw.deleteAll();
      draw.changeMode('draw_polygon');
      map.getContainer().classList.add('draw-area-active');
      setDrawAreaToggleUi(true);
    };

    async function onDrawComplete(e) {
      setDrawAreaToggleUi(false);
      map.getContainer().classList.remove('draw-area-active');

      const feature = e.features[0];
      if (!feature || feature.geometry.type !== 'Polygon') return;

      const coords = feature.geometry.coordinates[0];
      const lons = coords.map(c => c[0]);
      const lats = coords.map(c => c[1]);
      const south = Math.max(Math.min(...lats), -90);
      const north = Math.min(Math.max(...lats), 90);
      const west  = Math.max(Math.min(...lons), -180);
      const east  = Math.min(Math.max(...lons), 179.875);

      // Convert to array indices (clamp to grid)
      const latStart = Math.max(latToIndex(north), 0);        // north = smaller index
      const latEnd   = Math.min(latToIndex(south) + 1, NY);   // south = larger index
      const lonStart = Math.max(lonToIndex(west), 0);
      const lonEnd   = Math.min(lonToIndex(east) + 1, NX);

      const nLat = latEnd - latStart;
      const nLon = lonEnd - lonStart;
      const totalPixels = nLat * nLon;

      if (totalPixels > MAX_PIXELS) {
        showToast(`Selected area is too large (${totalPixels.toLocaleString()} pixels). Draw a smaller region (max ~390×390).`, 'error');
        draw.deleteAll();
        setDrawAreaToggleUi(false);
        return;
      }

      // Store bounds for canvas rendering
      sliceBounds = { south, west, north, east, latStart, latEnd, lonStart, lonEnd, nLat, nLon };

      // Show loading
      document.getElementById('loading').classList.remove('hidden');

      try {
        // Release old data
        sliceData = null;

        const result = await fetchSlice(currentParam, latStart, latEnd, lonStart, lonEnd);
        sliceData = result.data;

        // Compute min/max for color scale (excluding NaN)
        computeColorScale();

        // Show UI
        currentStep = 0;
        document.getElementById('playback').classList.remove('hidden');
        document.getElementById('clock').classList.remove('hidden');
        document.getElementById('legend').classList.remove('hidden');

        document.getElementById('area-info').classList.remove('hidden');
        document.getElementById('area-info').textContent =
          `${nLat}×${nLon} pixels (${totalPixels.toLocaleString()}) | ${sliceBounds.nLat * 0.125}° × ${sliceBounds.nLon * 0.125}°`;

        updateTimeline();
        renderLegend();
        renderFrame();

        // Clear the drawn rectangle — the color overlay is now the selection
        draw.deleteAll();
        setDrawAreaToggleUi(false);

        // Close the controls panel so the map is fully visible
        if (panelVisible) togglePanel();

        // Auto-play animation
        if (!playing) togglePlay();
      } catch (err) {
        showToast(`Failed to fetch data: ${err.message}`, 'error');
        console.error(err);
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    // =======================================================================
    // Color Scales
    // =======================================================================
    const RAMP_MAP = {
      turbo:    d3.interpolateTurbo,
      viridis:  d3.interpolateViridis,
      inferno:  d3.interpolateInferno,
      magma:    d3.interpolateMagma,
      plasma:   d3.interpolatePlasma,
      warm:     d3.interpolateWarm,
      cool:     d3.interpolateCool,
      spectral: d3.interpolateSpectral,
      rdylbu:   d3.interpolateRdYlBu,
      ylgnbu:   d3.interpolateYlGnBu,
      blues:    d3.interpolateBlues,
    };

    function getInterpolator() {
      if (currentRamp !== 'auto' && RAMP_MAP[currentRamp]) return RAMP_MAP[currentRamp];
      return RAMP_MAP[paramCfg().ramp] || d3.interpolateYlGnBu;
    }

    function computeColorScale() {
      if (!sliceData) return;

      let min = Infinity, max = -Infinity;
      for (let i = 0; i < sliceData.length; i++) {
        const v = sliceData[i];
        if (!isNaN(v) && isFinite(v)) {
          const mapped = paramCfg().convert(v);
          if (mapped < min) min = mapped;
          if (mapped > max) max = mapped;
        }
      }

      autoDataMin = min;
      autoDataMax = max;
      dataMin = min;
      dataMax = max;

      // Sync UI inputs with auto values
      const inputMin = document.getElementById('input-min');
      const inputMax = document.getElementById('input-max');
      if (inputMin) inputMin.value = dataMin.toFixed(1);
      if (inputMax) inputMax.value = dataMax.toFixed(1);

      rebuildColorScale();
    }

    function rebuildColorScale() {
      const interp = getInterpolator();
      const domainMin = paramCfg().zeroTransparent ? Math.max(0, dataMin) : dataMin;
      colorScale = d3.scaleSequential(interp).domain([domainMin, dataMax]);
    }

    window.changeColorRamp = function(ramp) {
      currentRamp = ramp;
      if (!sliceData) return;
      rebuildColorScale();
      renderLegend();
      renderFrame();
    };

    window.applyCustomRange = function() {
      const inputMin = document.getElementById('input-min');
      const inputMax = document.getElementById('input-max');
      const newMin = parseFloat(inputMin.value);
      const newMax = parseFloat(inputMax.value);
      if (isNaN(newMin) || isNaN(newMax) || newMin >= newMax) {
        showToast('Invalid range — min must be less than max.', 'error');
        return;
      }
      dataMin = newMin;
      dataMax = newMax;
      rebuildColorScale();
      renderLegend();
      renderFrame();
    };

    window.resetRange = function() {
      dataMin = autoDataMin;
      dataMax = autoDataMax;
      const inputMin = document.getElementById('input-min');
      const inputMax = document.getElementById('input-max');
      if (inputMin) inputMin.value = dataMin.toFixed(1);
      if (inputMax) inputMax.value = dataMax.toFixed(1);
      rebuildColorScale();
      renderLegend();
      renderFrame();
    };

    function valueToColor(rawValue) {
      if (isNaN(rawValue)) return [0, 0, 0, 0];

      const cfg = paramCfg();
      const v = cfg.convert(rawValue);

      // Zero-transparent fields (e.g. precipitation): hide near-zero values
      if (cfg.zeroTransparent && v < 0.01) return [0, 0, 0, 0];

      const cssColor = colorScale(v);
      const c = d3.color(cssColor);
      if (!c) return [0, 0, 0, 0];
      const dm = dataMax || 1;
      const baseA = cfg.zeroTransparent
        ? Math.min(255, Math.round(180 + 75 * (v / dm)))
        : 200;
      return [c.r, c.g, c.b, baseA];
    }

    function getLayerOpacity() {
      const el = document.getElementById('layer-opacity');
      if (!el) return 0.85;
      return Math.max(0, Math.min(1, parseInt(el.value, 10) / 100));
    }

    function isSmoothField() {
      const el = document.getElementById('chk-smooth');
      return !el || el.checked;
    }

    function wantContours() {
      const el = document.getElementById('chk-contours');
      return !!(el && el.checked);
    }

    function bilinearSample(arr, base, nLat, nLon, fi, fj) {
      fi = Math.min(Math.max(fi, 0), nLat - 1 - 1e-9);
      fj = Math.min(Math.max(fj, 0), nLon - 1 - 1e-9);
      const i0 = Math.floor(fi);
      const i1 = Math.min(i0 + 1, nLat - 1);
      const j0 = Math.floor(fj);
      const j1 = Math.min(j0 + 1, nLon - 1);
      const ti = fi - i0;
      const tj = fj - j0;
      const at = (i, j) => arr[base + i * nLon + j];
      const ok = (x) => !isNaN(x) && isFinite(x);
      const v00 = at(i0, j0), v01 = at(i0, j1), v10 = at(i1, j0), v11 = at(i1, j1);
      const w00 = ok(v00) ? (1 - ti) * (1 - tj) : 0;
      const w01 = ok(v01) ? (1 - ti) * tj : 0;
      const w10 = ok(v10) ? ti * (1 - tj) : 0;
      const w11 = ok(v11) ? ti * tj : 0;
      const wsum = w00 + w01 + w10 + w11;
      if (wsum < 1e-12) return NaN;
      return (w00 * (ok(v00) ? v00 : 0) + w01 * (ok(v01) ? v01 : 0)
        + w10 * (ok(v10) ? v10 : 0) + w11 * (ok(v11) ? v11 : 0)) / wsum;
    }

    function contourMaskSegments(mask) {
      switch (mask) {
        case 0: case 15: return [];
        case 1: case 14: return [[3, 0]];
        case 2: case 13: return [[0, 1]];
        case 3: case 12: return [[1, 3]];
        case 4: case 11: return [[1, 2]];
        case 5: return [[0, 3], [1, 2]];
        case 6: case 9: return [[0, 2]];
        case 7: case 8: return [[2, 3]];
        case 10: return [[0, 1], [2, 3]];
        default: return [];
      }
    }

    function edgeIsoPoint(pA, vA, pB, vB, L) {
      if ((vA - L) * (vB - L) > 0) return null;
      if (Math.abs(vA - vB) < 1e-9) return null;
      const t = (L - vA) / (vB - vA);
      if (t < 0 || t > 1) return null;
      return { x: pA.x + t * (pB.x - pA.x), y: pA.y + t * (pB.y - pA.y) };
    }

    function drawContoursOverlay(stepBase, nLat, nLon, ss) {
      const nlev = 7;
      const levels = [];
      const span = dataMax - dataMin;
      if (span <= 0 || !isFinite(span)) return;

      for (let k = 1; k < nlev; k++) {
        levels.push(dataMin + (span * k) / nlev);
      }

      renderCtx.save();
      renderCtx.strokeStyle = 'rgba(255,255,255,0.45)';
      renderCtx.lineWidth = 1;
      renderCtx.lineJoin = 'round';

      const gv = (ii, jj) => {
        const raw = sliceData[stepBase + ii * nLon + jj];
        if (isNaN(raw)) return NaN;
        return paramCfg().convert(raw);
      };
      const pj = (ii, jj) => ({ x: jj * ss, y: ii * ss });

      let stride = 1;
      if (nLat * nLon > 12000) stride = 2;
      if (nLat * nLon > 48000) stride = 3;

      for (const L of levels) {
        renderCtx.beginPath();
        for (let i = 0; i < nLat - stride; i += stride) {
          for (let j = 0; j < nLon - stride; j += stride) {
            const v00 = gv(i, j);
            const v10 = gv(i, j + stride);
            const v11 = gv(i + stride, j + stride);
            const v01 = gv(i + stride, j);
            if ([v00, v10, v11, v01].some((x) => isNaN(x))) continue;

            const p00 = pj(i, j);
            const p10 = pj(i, j + stride);
            const p11 = pj(i + stride, j + stride);
            const p01 = pj(i + stride, j);

            const e0 = edgeIsoPoint(p00, v00, p10, v10, L);
            const e1 = edgeIsoPoint(p10, v10, p11, v11, L);
            const e2 = edgeIsoPoint(p01, v01, p11, v11, L);
            const e3 = edgeIsoPoint(p00, v00, p01, v01, L);
            const edges = [e0, e1, e2, e3];

            const b0 = v00 >= L ? 1 : 0;
            const b1 = v10 >= L ? 1 : 0;
            const b2 = v11 >= L ? 1 : 0;
            const b3 = v01 >= L ? 1 : 0;
            const mask = b0 | (b1 << 1) | (b2 << 2) | (b3 << 3);

            for (const [ea, eb] of contourMaskSegments(mask)) {
              const pa = edges[ea];
              const pb = edges[eb];
              if (pa && pb) {
                renderCtx.moveTo(pa.x, pa.y);
                renderCtx.lineTo(pb.x, pb.y);
              }
            }
          }
        }
        renderCtx.stroke();
      }
      renderCtx.restore();
    }

    // =======================================================================
    // Canvas Rendering
    // =======================================================================
    function renderFrame() {
      if (!sliceData || !sliceBounds || !renderCtx || !renderCanvas || !map) return;

      const { nLat, nLon, latStart, lonStart } = sliceBounds;
      const stepBase = currentStep * nLat * nLon;
      const layerOp = getLayerOpacity();
      const smooth = isSmoothField();
      const ss = smooth ? 2 : 1;
      const imgW = (nLon - 1) * ss + 1;
      const imgH = (nLat - 1) * ss + 1;

      renderCanvas.width = imgW;
      renderCanvas.height = imgH;
      const imgData = new ImageData(imgW, imgH);
      const pixels = imgData.data;

      for (let py = 0; py < imgH; py++) {
        for (let px = 0; px < imgW; px++) {
          const fj = px / ss;
          const fi = py / ss;
          const val = smooth
            ? bilinearSample(sliceData, stepBase, nLat, nLon, fi, fj)
            : sliceData[stepBase + Math.round(fi) * nLon + Math.round(fj)];
          const [r, g, b, a0] = valueToColor(val);
          const a = Math.round(a0 * layerOp);
          const idx = (py * imgW + px) * 4;
          pixels[idx] = r;
          pixels[idx + 1] = g;
          pixels[idx + 2] = b;
          pixels[idx + 3] = a;
        }
      }

      renderCtx.putImageData(imgData, 0, 0);

      if (wantContours()) {
        drawContoursOverlay(stepBase, nLat, nLon, ss);
      }

      const coordinates = [
        [indexToLon(lonStart), indexToLat(latStart)],
        [indexToLon(lonStart + nLon), indexToLat(latStart)],
        [indexToLon(lonStart + nLon), indexToLat(latStart + nLat)],
        [indexToLon(lonStart), indexToLat(latStart + nLat)],
      ];

      const imageUrl = renderCanvas.toDataURL('image/png');
      const src = map.getSource(DATA_SOURCE_ID);
      if (src && typeof src.updateImage === 'function') {
        src.updateImage({ url: imageUrl, coordinates });
      } else {
        map.addSource(DATA_SOURCE_ID, {
          type: 'image',
          url: imageUrl,
          coordinates,
        });
        map.addLayer({
          id: DATA_LAYER_ID,
          type: 'raster',
          source: DATA_SOURCE_ID,
          paint: {
            'raster-resampling': smooth ? 'linear' : 'nearest',
          },
        });
      }

      map.setPaintProperty(DATA_LAYER_ID, 'raster-opacity', getLayerOpacity());
      map.setPaintProperty(DATA_LAYER_ID, 'raster-resampling', smooth ? 'linear' : 'nearest');
    }

    // =======================================================================
    // Legend
    // =======================================================================
    function renderLegend() {
      const legendCanvas = document.getElementById('legend-canvas');
      const lCtx = legendCanvas.getContext('2d');
      const h = legendCanvas.height;
      const w = legendCanvas.width;

      for (let y = 0; y < h; y++) {
        const t = y / h;
        const val = dataMax - t * (dataMax - dataMin);
        const cssColor = colorScale(val);
        lCtx.fillStyle = cssColor;
        lCtx.fillRect(0, y, w, 1);
      }

      const { unit, decimals } = paramCfg();
      document.getElementById('legend-max').textContent = `${dataMax.toFixed(decimals)}${unit}`;
      document.getElementById('legend-min').textContent = `${dataMin.toFixed(decimals)}${unit}`;
    }

    // =======================================================================
    // Animation / Playback
    // =======================================================================
    window.togglePlay = function() {
      playing = !playing;
      document.getElementById('icon-play').classList.toggle('hidden', playing);
      document.getElementById('icon-pause').classList.toggle('hidden', !playing);
      if (playing) {
        lastFrameTime = performance.now();
        requestAnimationFrame(animationLoop);
      }
    };

    window.seekTo = function(hourVal) {
      if (!stepsArray) return;
      const hour = parseInt(hourVal);
      // Find the step whose forecast hour is closest to the dragged position
      let best = 0, bestDiff = Infinity;
      for (let i = 0; i < stepsArray.length; i++) {
        const d = Math.abs(stepsArray[i] - hour);
        if (d < bestDiff) { bestDiff = d; best = i; }
        if (d === 0) break;
      }
      currentStep = best;
      updateTimeline();
      renderFrame();
    };

    window.setSpeed = function(val) {
      playSpeed = parseFloat(val);
    };

    function animationLoop(now) {
      if (!playing) return;

      const elapsed = now - lastFrameTime;
      // Base: ~4 fps at 1x speed (250ms per step)
      const msPerStep = 250 / playSpeed;

      if (elapsed >= msPerStep) {
        lastFrameTime = now;
        const nSteps = stepsArray ? stepsArray.length : 93;
        currentStep = (currentStep + 1) % nSteps;
        document.getElementById('timeline').value = stepsArray ? stepsArray[currentStep] : currentStep;
        updateTimeline();
        renderFrame();
      }

      requestAnimationFrame(animationLoop);
    }

    function updateTimeline() {
      if (!stepsArray || !runInitTime) return;

      const hour = stepsArray[currentStep];
      document.getElementById('timeline').value = hour;
      const validTime = new Date(runInitTime.getTime() + hour * 3600 * 1000);
      const opts = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZone: 'UTC' };
      const formatted = validTime.toLocaleDateString('en-US', opts) + ' UTC';

      const stepText = `Step ${currentStep} (T+${hour}h) — ${formatted}`;
      const stepEl = document.getElementById('step-label');
      stepEl.textContent = stepText;
      stepEl.title = stepText;
      document.getElementById('clock-time').textContent = formatted;
      document.getElementById('clock-meta').textContent =
        `T+${hour}h | ICON ${spatialIndex.run.slice(8)}Z Run`;
    }

    // =======================================================================
    // Parameter Switching
    // =======================================================================
    window.switchParam = function(param) {
      currentParam = param;

      // Sync dropdown (handles calls from outside the select's onchange)
      const sel = document.getElementById('param-select');
      if (sel && sel.value !== param) sel.value = param;

      // If we have bounds, re-fetch with new param
      if (sliceBounds) {
        sliceData = null;
        clearDataOverlay();
        document.getElementById('loading').classList.remove('hidden');

        fetchSlice(param, sliceBounds.latStart, sliceBounds.latEnd, sliceBounds.lonStart, sliceBounds.lonEnd)
          .then(result => {
            sliceData = result.data;
            computeColorScale();
            renderLegend();
            renderFrame();
          })
          .catch(err => showToast(`Failed: ${err.message}`, 'error'))
          .finally(() => document.getElementById('loading').classList.add('hidden'));
      }
    };

    // =======================================================================
    // Tooltip / Hover
    // =======================================================================
    function onCanvasHover(e) {
      if (!sliceData || !sliceBounds) return;

      const tooltip = document.getElementById('tooltip');
      const { latStart, lonStart, nLat, nLon } = sliceBounds;

      // Screen → geo
      const lngLat = map.unproject([e.clientX, e.clientY]);
      const lat = lngLat.lat;
      const lon = lngLat.lng;

      // Geo → data index
      const gi = latToIndex(lat) - latStart;
      const gj = lonToIndex(lon) - lonStart;

      if (gi < 0 || gi >= nLat || gj < 0 || gj >= nLon) {
        tooltip.classList.add('hidden');
        return;
      }

      const nSteps = stepsArray ? stepsArray.length : 93;
      const val = sliceData[currentStep * nLat * nLon + gi * nLon + gj];
      const { unit, decimals, convert, sparkColor } = paramCfg();
      const displayVal = isNaN(val) ? 'No data' : `${convert(val).toFixed(decimals)} ${unit}`;

      const latLabel = lat >= 0 ? `${lat.toFixed(3)}°N` : `${(-lat).toFixed(3)}°S`;
      const lonLabel = lon >= 0 ? `${lon.toFixed(3)}°E` : `${(-lon).toFixed(3)}°W`;
      document.getElementById('tooltip-coords').textContent = `${latLabel}, ${lonLabel}`;
      document.getElementById('tooltip-value').textContent = displayVal;

      // Sparkline: time series for this pixel
      const sparkCanvas = document.getElementById('tooltip-spark');
      const sCtx = sparkCanvas.getContext('2d');
      sCtx.clearRect(0, 0, sparkCanvas.width, sparkCanvas.height);

      const series = [];
      for (let s = 0; s < nSteps; s++) {
        series.push(sliceData[s * nLat * nLon + gi * nLon + gj]);
      }

      let sMin = Infinity, sMax = -Infinity;
      for (const v of series) { const cv = convert(v); if (!isNaN(cv)) { if (cv < sMin) sMin = cv; if (cv > sMax) sMax = cv; } }

      const range = sMax - sMin || 1;
      sCtx.strokeStyle = sparkColor;
      sCtx.lineWidth = 1.5;
      sCtx.beginPath();
      for (let s = 0; s < nSteps; s++) {
        const v = convert(series[s]);
        const x = (s / (nSteps - 1)) * sparkCanvas.width;
        const y = sparkCanvas.height - ((v - sMin) / range) * (sparkCanvas.height - 4) - 2;
        s === 0 ? sCtx.moveTo(x, y) : sCtx.lineTo(x, y);
      }
      sCtx.stroke();

      // Draw current step marker
      const cx = (currentStep / (nSteps - 1)) * sparkCanvas.width;
      const cv = convert(series[currentStep]);
      const cy = sparkCanvas.height - ((cv - sMin) / range) * (sparkCanvas.height - 4) - 2;
      sCtx.fillStyle = 'white';
      sCtx.beginPath();
      sCtx.arc(cx, cy, 3, 0, Math.PI * 2);
      sCtx.fill();

      // Position tooltip
      tooltip.classList.remove('hidden');
      if (isMobile()) {
        // Measure after un-hiding so we know the real height
        const ttW = tooltip.offsetWidth;
        const ttH = tooltip.offsetHeight;
        const FINGER_GAP = 90; // px clearance above fingertip

        // Keep tooltip above the playback panel
        const playbackEl = document.getElementById('playback');
        const panelTop = playbackEl && !playbackEl.classList.contains('hidden')
          ? playbackEl.getBoundingClientRect().top
          : window.innerHeight;
        const maxBottom = panelTop - 8; // 8px above panel top edge

        // Prefer above finger; if that would clip the top, push down but still
        // stay above the panel
        let ty = e.clientY - ttH - FINGER_GAP;
        ty = Math.max(8, ty);                          // don't go above screen
        ty = Math.min(ty, maxBottom - ttH);            // don't overlap panel
        const tx = Math.max(8, Math.min(e.clientX - ttW / 2, window.innerWidth - ttW - 8));
        tooltip.style.left = `${tx}px`;
        tooltip.style.top  = `${ty}px`;
      } else {
        const tx = e.clientX + 16;
        const ty = e.clientY - 10;
        tooltip.style.left = `${Math.min(tx, window.innerWidth - 200)}px`;
        tooltip.style.top  = `${Math.min(ty, window.innerHeight - 100)}px`;
      }
    }

    // =======================================================================
    // Initialization
    // =======================================================================
    async function init() {
      initMap();
      void ensurePatchedDarkStyle();

      try {
        // Fetch run metadata
        spatialIndex = await fetchJson('spatial_index.json');
        stepsArray = spatialIndex.steps;

        // Parse run init time: "2026040406" → Date
        const runStr = spatialIndex.run;
        const year  = parseInt(runStr.slice(0, 4));
        const month = parseInt(runStr.slice(4, 6)) - 1;
        const day   = parseInt(runStr.slice(6, 8));
        const hour  = parseInt(runStr.slice(8, 10));
        runInitTime = new Date(Date.UTC(year, month, day, hour));

        // Update run badge
        const runLabel = `ICON ${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')} ${String(hour).padStart(2,'0')}Z`;
        document.getElementById('run-badge').textContent = runLabel;

        // Set timeline range to actual forecast hours (not step count)
        const maxHour = stepsArray[stepsArray.length - 1];
        const breakHour = 78; // last 1-hourly step; 3-hourly begins at +81h
        const tlEl = document.getElementById('timeline');
        tlEl.max   = maxHour;
        tlEl.value = 0;
        // Position the break-tick proportionally
        const breakPct = (breakHour / maxHour) * 100;
        const tickEl = document.getElementById('timeline-break');
        if (tickEl) tickEl.style.left = `${breakPct}%`;

        showToast('Dashboard ready — draw a rectangle on the map to load forecast data.', 'info');
      } catch (err) {
        showToast(`Failed to connect: ${err.message}. Check Worker URL.`, 'error');
        console.error(err);
      }
    }

    init();
  </script>
</body>
